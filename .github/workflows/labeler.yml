name: Auto-label PR

# Sätter labels på PR:er automatiskt utifrån branch-prefixet (se .github/labeler.yml).
# Labels driver i sin tur grupperingen av release notes (.github/release.yml).
on:
  pull_request:
    branches: [main]

# Behörighet att skriva labels på PR:en. contents: read räcker för resten.
permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Sätt labels från branch-namn
        uses: actions/labeler@v5
